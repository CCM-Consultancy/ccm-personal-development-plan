<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="ak" content="ANTHROPIC_KEY_PLACEHOLDER">
<title>Personal Development Plan – CCM Consultancy</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --lime:#C8F400;--dark:#0A1A0C;--card:#0F1E12;
  --border:rgba(200,244,0,0.12);--text:#E8F5E0;--muted:#6A8A6E;
  --accent:#4DFFA0;--danger:#FF6B4A;--warn:#FFD166;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100vh}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);overflow-x:hidden}
#app{width:100%;max-width:680px;margin:0 auto;padding:16px 14px 80px}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:16px;gap:10px;flex-wrap:wrap}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-left img{height:32px;border-radius:5px}
.topbar-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--lime);letter-spacing:.5px}
.topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.chip{font-size:11px;color:var(--muted);background:rgba(255,255,255,0.04);padding:3px 9px;border-radius:20px;border:1px solid rgba(255,255,255,0.06);white-space:nowrap}
.btn-xs{font-size:11px;padding:4px 10px;border-radius:7px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .2s}
.btn-xs:hover{border-color:var(--lime);color:var(--lime)}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px}
.card-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--lime);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px 14px}
.login-box{width:100%;max-width:420px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:30px 24px}
.login-logo{height:44px;display:block;margin:0 auto 16px;border-radius:6px}
.login-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--lime);text-align:center;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:8px;line-height:1.6}
.login-intro{background:rgba(200,244,0,0.05);border:1px solid rgba(200,244,0,0.1);border-radius:10px;padding:14px;margin-bottom:20px;font-size:12px;color:#a0c8a4;line-height:1.75}
.login-intro strong{color:var(--lime);display:block;margin-bottom:6px;font-family:'Syne',sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase}
.login-intro li{margin-left:14px;margin-bottom:3px}
.tabs{display:flex;gap:6px;margin-bottom:18px}
.tab{flex:1;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;padding:7px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;text-transform:uppercase}
.tab.on{background:var(--lime);color:var(--dark);border-color:var(--lime)}
.inp{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:9px;padding:10px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;margin-bottom:10px;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--lime)}
.inp::placeholder{color:var(--muted);font-style:italic}
textarea.inp{resize:vertical;min-height:80px;line-height:1.6}
.btn-main{width:100%;background:var(--lime);color:var(--dark);border:none;border-radius:9px;padding:12px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:opacity .2s;margin-top:4px}
.btn-main:hover{opacity:.88}
.btn-main:disabled{opacity:.4;cursor:not-allowed}
.err{font-size:12px;color:var(--danger);margin-bottom:8px}

/* STEPS NAV */
.steps-nav{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.steps-nav::-webkit-scrollbar{display:none}
.step-dot{flex-shrink:0;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.5px;padding:6px 12px;border-radius:7px;border:1px solid rgba(255,255,255,0.08);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap}
.step-dot.on{background:var(--lime);color:var(--dark);border-color:var(--lime)}
.step-dot.done{border-color:rgba(77,255,160,0.3);color:var(--accent)}

/* FORM */
.fgroup{margin-bottom:16px}
.flabel{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;display:block}
.fhint{font-size:11px;color:rgba(106,138,110,0.6);margin-top:4px;line-height:1.5;font-style:italic}
.fexample{font-size:12px;color:rgba(106,138,110,0.7);font-style:italic;margin-top:5px;line-height:1.55;padding:8px 10px;background:rgba(255,255,255,0.02);border-radius:6px;border-left:2px solid rgba(200,244,0,0.2)}

/* HABIT BLOCK */
.habit-block{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:11px;padding:14px;margin-bottom:12px}
.habit-block-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--lime);margin-bottom:12px;letter-spacing:.5px}

/* DASHBOARD */
.day-card{background:linear-gradient(135deg,rgba(200,244,0,0.08),rgba(77,255,160,0.04));border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px}
.day-big{font-family:'Syne',sans-serif;font-size:38px;font-weight:800;color:var(--lime);line-height:1}
.day-lbl{font-size:11px;color:var(--muted);margin-top:3px}
.phase-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.phase-tile{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px 8px;text-align:center}
.phase-tile.now{border-color:rgba(200,244,0,0.3);background:rgba(200,244,0,0.04)}
.phase-tile.done{border-color:rgba(77,255,160,0.25)}
.phase-pct{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--lime)}
.phase-lbl{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.phase-bar{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-top:6px}
.phase-fill{height:100%;background:var(--lime);border-radius:2px}

/* HABIT CHECK */
.hcheck{display:flex;align-items:center;gap:10px;padding:11px 13px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:9px;margin-bottom:7px;cursor:pointer;transition:all .2s}
.hcheck.yes{border-color:rgba(77,255,160,0.3);background:rgba(77,255,160,0.04)}
.hcheck-box{width:20px;height:20px;border-radius:5px;border:2px solid var(--muted);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.hcheck.yes .hcheck-box{background:var(--accent);border-color:var(--accent)}
.hcheck-name{font-size:13px;flex:1}
.hcheck-streak{font-size:11px;color:var(--warn)}

/* REFLECTION */
.ref-block{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:11px;padding:14px;margin-bottom:12px}
.ref-block.open{border-color:rgba(200,244,0,0.2)}
.ref-block.done{border-color:rgba(77,255,160,0.2)}
.ref-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ref-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text)}
.badge{display:inline-block;font-size:9px;font-weight:700;letter-spacing:1px;padding:3px 7px;border-radius:5px;text-transform:uppercase}
.badge-lime{background:rgba(200,244,0,0.12);color:var(--lime);border:1px solid rgba(200,244,0,0.2)}
.badge-green{background:rgba(77,255,160,0.1);color:var(--accent);border:1px solid rgba(77,255,160,0.2)}
.badge-muted{background:rgba(255,255,255,0.04);color:var(--muted);border:1px solid rgba(255,255,255,0.08)}
.ref-habit-label{font-size:11px;color:var(--lime);letter-spacing:.5px;font-weight:600;margin-bottom:6px;font-family:'Syne',sans-serif}

/* BUTTONS */
.btn-green{background:var(--accent);color:var(--dark);border:none;border-radius:8px;padding:9px 18px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:opacity .2s}
.btn-green:hover{opacity:.85}
.btn-green:disabled{opacity:.4;cursor:not-allowed}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .2s}
.btn-outline:hover{border-color:var(--lime);color:var(--lime)}
.brow{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}

/* ADMIN */
.atable{width:100%;border-collapse:collapse;font-size:12px}
.atable th{text-align:left;font-family:'Syne',sans-serif;font-size:9px;letter-spacing:1px;color:var(--muted);padding:7px 9px;border-bottom:1px solid rgba(255,255,255,0.06);text-transform:uppercase}
.atable td{padding:9px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:top}
.atable tr:hover td{background:rgba(255,255,255,0.02)}
.ppill{display:inline-block;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:600}
.phi{background:rgba(77,255,160,0.12);color:var(--accent)}
.pmd{background:rgba(255,209,102,0.12);color:var(--warn)}
.plo{background:rgba(255,107,74,0.12);color:var(--danger)}

/* AI BOX */
.ai-box{background:rgba(96,200,255,0.04);border:1px solid rgba(96,200,255,0.15);border-radius:10px;padding:14px;margin-top:12px;font-size:12px;line-height:1.8;color:#b0d8f0;white-space:pre-wrap}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(16px);background:#162a18;border:1px solid var(--accent);color:var(--accent);padding:9px 18px;border-radius:9px;font-size:12px;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* SPINNER */
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.15);border-top-color:var(--lime);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes sp{to{transform:rotate(360deg)}}

/* SECTION DIVIDER */
.sdiv{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;padding:8px 0 5px;border-bottom:1px solid rgba(255,255,255,0.05);margin-bottom:12px}

@media(max-width:480px){
  .phase-grid{grid-template-columns:repeat(3,1fr)}
  .phase-pct{font-size:16px}
  #app{padding:12px 10px 80px}
  .card{padding:16px}
}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
const SUPA_URL='https://exqpnofliridwdrcyien.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4cXBub2ZsaXJpZHdkcmN5aWVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MDYwODgsImV4cCI6MjA5MTk4MjA4OH0.xVkvptHGnTDAoQ288uQiAHSct2qpREMzY-2dRdGwt8M';
const ANTHROPIC_KEY=document.querySelector('meta[name="ak"]')?.content||'';
const ADMIN_CODE='admin2024';
const LOGO='https://www.ccmconsultancy.com/wp-content/uploads/2019/09/cropped-CCM-Square-8-150.png';

// ── SUPABASE ─────────────────────────────────────────────
async function dbQ(path,opts={}){
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/${path}`,{
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})},
      ...opts
    });
    if(!r.ok){const t=await r.text();console.error('DB',r.status,t);return null;}
    const ct=r.headers.get('content-type')||'';
    return ct.includes('json')?await r.json():true;
  }catch(e){console.error(e);return null;}
}
async function getUser(email){
  const d=await dbQ(`pdp_users?email=eq.${encodeURIComponent(email)}&limit=1`);
  return d&&d.length?d[0]:null;
}
async function saveUser(u){
  const exists=await getUser(u.email);
  const payload={...u,updated_at:new Date().toISOString()};
  if(exists){
    await dbQ(`pdp_users?email=eq.${encodeURIComponent(u.email)}`,{method:'PATCH',body:JSON.stringify(payload)});
  }else{
    payload.created_at=new Date().toISOString();
    await dbQ('pdp_users',{method:'POST',body:JSON.stringify(payload)});
  }
}
async function getAllUsers(){
  const d=await dbQ('pdp_users?select=*&order=created_at.desc');
  return d||[];
}

// ── STATE ────────────────────────────────────────────────
let S={
  screen:'login',loginMode:'p',
  user:null,ud:null,
  step:0,adminTab:'list',adminUsers:[],
  selUser:null,aiReport:'',aiLoading:false,saving:false
};
function set(p){Object.assign(S,p);render();}

// ── HELPERS ──────────────────────────────────────────────
function toast(m,d=2500){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),d);
}
function dayNum(sd){
  if(!sd)return 1;
  return Math.max(1,Math.floor((Date.now()-new Date(sd))/86400000)+1);
}
function phPct(ud,pi){
  const h=ud.habits||[];if(!h.length)return 0;
  const ranges=[[1,30],[31,60],[61,90]];
  const[s,e]=ranges[pi];const ci=ud.checkins||{};
  let done=0,tot=0;
  for(let d=s;d<=e;d++){h.forEach((_,i)=>{tot++;if(ci[d]&&ci[d][i])done++;});}
  return tot?Math.round(done/tot*100):0;
}
function hStreak(ud,hi){
  const d=dayNum(ud.start_date);const ci=ud.checkins||{};
  let s=0;for(let x=d;x>=1;x--){if(ci[x]&&ci[x][hi])s++;else break;}return s;
}
function pc(p){return p>=70?'phi':p>=40?'pmd':'plo';}

// ── RENDER ───────────────────────────────────────────────
function render(){
  document.getElementById('app').innerHTML=
    S.screen==='login'?rLogin():
    S.screen==='participant'?rPart():
    rAdmin();
}

// ── LOGIN ────────────────────────────────────────────────
function rLogin(){
  const isP=S.loginMode==='p';
  return`<div class="login-wrap">
  <div class="login-box">
    <img src="${LOGO}" class="login-logo">
    <div class="login-title">Personal Development Plan</div>
    <div class="login-sub">CCM Consultancy · 90-Day Growth Journey</div>
    ${isP?`<div class="login-intro">
      <strong>Welcome</strong>
      Congratulations on completing the workshop! This plan uses James Clear's <em>Atomic Habits</em> framework to turn your insights into consistent daily action over 90 days.
      <ul style="margin-top:8px">
        <li>Be specific and start small (1–2 tiny habits)</li>
        <li>Prioritise consistent daily action over the end goal</li>
        <li>Share your ideas with colleagues on the course</li>
        <li>Discuss your plan with your line manager</li>
        <li>Review your plan in tele-mentoring sessions</li>
        <li>Keep this plan visible and practice self-compassion</li>
      </ul>
    </div>`:''}
    <div class="tabs">
      <button class="tab ${isP?'on':''}" onclick="set({loginMode:'p'})">Participant</button>
      <button class="tab ${!isP?'on':''}" onclick="set({loginMode:'a'})">Admin</button>
    </div>
    <div id="lerr" class="err" style="display:none"></div>
    ${isP?`
      <input class="inp" id="ln" placeholder="Your full name">
      <input class="inp" id="le" placeholder="Your email address" type="email">
      <input class="inp" id="lw" placeholder="Workshop name (e.g. Authentic Leadership)" style="margin-bottom:14px">
      <button class="btn-main" onclick="doLogin()">Enter My PDP →</button>
      <div style="font-size:11px;color:var(--muted);margin-top:10px;text-align:center">Returning? Use the same email to continue your plan.</div>
    `:`
      <input class="inp" id="lac" placeholder="Admin code" type="password" style="margin-bottom:14px">
      <button class="btn-main" onclick="doAdmin()">Access Dashboard →</button>
    `}
  </div>
</div>`;
}

async function doLogin(){
  const name=document.getElementById('ln').value.trim();
  const email=document.getElementById('le').value.trim();
  const ws=document.getElementById('lw').value.trim();
  const err=document.getElementById('lerr');
  if(!name||!email){err.style.display='block';err.textContent='Please enter your name and email.';return;}
  if(!email.includes('@')){err.style.display='block';err.textContent='Please enter a valid email.';return;}
  err.style.display='none';
  let ud=await getUser(email);
  if(!ud){
    ud={email,name,workshop:ws||'',start_date:new Date().toISOString().split('T')[0],plan:{},habits:[],checkins:{},reflections:{}};
    await saveUser(ud);
  }
  set({screen:'participant',user:{name:ud.name,email},ud,step:0});
}

async function doAdmin(){
  const code=document.getElementById('lac').value.trim();
  const err=document.getElementById('lerr');
  if(code!==ADMIN_CODE){err.style.display='block';err.textContent='Invalid admin code.';return;}
  const users=await getAllUsers();
  set({screen:'admin',adminTab:'list',adminUsers:users});
}

// ── PARTICIPANT ───────────────────────────────────────────
const STEPS=['Intro','My Plan','Habits','Dashboard','Reflections'];

function rPart(){
  const u=S.ud;const day=dayNum(u.start_date);
  return`
  <div class="topbar">
    <div class="topbar-left">
      <img src="${LOGO}">
      <span class="topbar-title">PDP Tracker</span>
    </div>
    <div class="topbar-right">
      <span class="chip">Day ${day}</span>
      <button class="btn-xs" onclick="doDownloadPDF()">⬇ PDF</button>
      <button class="btn-xs" onclick="set({screen:'login',loginMode:'p'})">Sign out</button>
    </div>
  </div>
  <div class="steps-nav">
    ${STEPS.map((s,i)=>`<button class="step-dot ${S.step===i?'on':''}" onclick="set({step:${i}})">${s}</button>`).join('')}
  </div>
  ${S.step===0?rIntro():S.step===1?rPlan():S.step===2?rHabits():S.step===3?rDash():rRef()}`;
}

// STEP 0 — INTRO
function rIntro(){
  const u=S.ud;
  return`<div class="card">
    <div class="card-title">👋 Welcome, ${u.name.split(' ')[0]}</div>
    <p style="font-size:13px;color:var(--muted);line-height:1.8;margin-bottom:14px">
      Congratulations on completing your workshop — <strong style="color:var(--text)">${u.workshop||'your programme'}</strong>.<br><br>
      Learning is valuable, but applying your insights consistently is what drives real growth. This Personal Development Plan uses principles from James Clear's <strong style="color:var(--lime)">Atomic Habits</strong> to help you translate key takeaways into small, actionable steps over <strong style="color:var(--text)">90 days</strong>.
    </p>
    <div style="background:rgba(200,244,0,0.05);border:1px solid rgba(200,244,0,0.1);border-radius:10px;padding:14px;margin-bottom:16px">
      <div style="font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--lime);margin-bottom:10px">TO MAKE THE MOST OF THIS PLAN</div>
      ${['Be specific and start small — 1 to 2 tiny habits is enough','Prioritise consistent daily action over focusing on the end goal','Share your ideas with colleagues participating in the course','Discuss your Action Plan with your line manager when you return to work','Bring your plan to your tele-mentoring sessions for further insights','Keep this plan visible, review it regularly, and adapt as needed','Practise self-compassion — progress is not always linear'].map(t=>`<div style="font-size:12px;color:#a0c8a4;margin-bottom:6px;display:flex;gap:8px;line-height:1.5"><span style="color:var(--lime);flex-shrink:0">›</span>${t}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">
      ${[['Phase 1','Days 1–30','Laying the Foundation'],['Phase 2','Days 31–60','Building Momentum'],['Phase 3','Days 61–90','Sustaining Growth']].map(([p,d,sub])=>`
        <div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:9px;padding:12px;text-align:center">
          <div style="font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--lime)">${p}</div>
          <div style="font-size:10px;color:var(--muted);margin:3px 0">${d}</div>
          <div style="font-size:10px;color:#a0c8a4">${sub}</div>
        </div>`).join('')}
    </div>

async function savePlan(){
  if(S.saving)return;
  set({saving:true});
  const u=S.ud;
  const plan={
    keylearnings:v('p-keylearnings'),identity:v('p-identity'),
    strengths:v('p-strengths'),gaps:v('p-gaps'),
    obstacles:v('p-obstacles'),solutions:v('p-solutions'),
    tracking:v('p-tracking'),accountability:v('p-accountability')
  };
  const habits=[];
  [0,1,2].forEach(i=>{
    const name=v(`h${i}-name`);
    if(name){
      habits.push({name,laws:[v(`h${i}-cue`),v(`h${i}-craving`),v(`h${i}-response`),v(`h${i}-reward`)]});
    }
  });
  u.plan=plan;u.habits=habits;
  await saveUser(u);
  S.ud=u;
  set({saving:false});
  toast('✓ Plan saved!');
}

function v(id){const el=document.getElementById(id);return el?el.value.trim():'';}

function rRef(){
  const u=S.ud;const day=dayNum(u.start_date);
  const ref=u.reflections||{};
  const h=u.habits||[];
  const phases=[
    {label:'Phase 1: 30-Day Check-in',sub:'Laying the Foundation',unlock:30},
    {label:'Phase 2: 60-Day Check-in',sub:'Building Momentum',unlock:60},
    {label:'Phase 3: 90-Day Check-in',sub:'Sustaining Growth',unlock:90}
  ];
  return`<div class="card">
    <div class="card-title">💬 Phase Reflections</div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.6">Reflections unlock at the end of each phase. Your habit names are carried over automatically — just reflect on your progress.</p>
    ${phases.map((ph,pi)=>{
      const isOpen=day>=ph.unlock;
      const isDone=ref[pi]&&h.every((_,hi)=>ref[pi][`h${hi}_ref`]);
      return`<div class="ref-block ${isOpen?'open':''} ${isDone?'done':''}">
        <div class="ref-header">
          <div>
            <span class="badge ${isDone?'badge-green':isOpen?'badge-lime':'badge-muted'}">${isDone?'✓ Complete':isOpen?'Unlocked':'Locked'}</span>
            <strong style="font-size:13px;color:var(--text);margin-left:8px">${ph.label}</strong>
          </div>
          <span style="font-size:11px;color:var(--muted)">${ph.sub}</span>
        </div>
        ${isOpen?`
          ${!h.length?'<p style="font-size:12px;color:var(--muted);font-style:italic">No habits set yet. Complete your plan first.</p>':
          h.map((hb,hi)=>`
            <div style="margin-bottom:14px">
              <div class="ref-habit-label">Action ${hi+1}: ${hb.name}</div>
              <div class="fgroup">
                <label class="flabel">Reflect on your progress with this action</label>
                <textarea class="inp" id="ref-${pi}-h${hi}" rows="3" placeholder="How has this habit been going? What have you noticed?">${(ref[pi]&&ref[pi][`h${hi}_ref`])||''}</textarea>
              </div>
            </div>`).join('')}
          <div class="fgroup">
            <label class="flabel">What's next? (Phase ${pi+1} onwards)</label>
            <textarea class="inp" id="ref-${pi}-next" rows="2" placeholder="What will you focus on or adjust going forward?">${(ref[pi]&&ref[pi].next)||''}</textarea>
          </div>
          <button class="btn-green" onclick="saveRef(${pi})">Save Phase ${pi+1} Reflection</button>
        `:`<div style="font-size:12px;color:var(--muted);font-style:italic">Unlocks on Day ${ph.unlock} · You are on Day ${day}</div>`}
      </div>`;
    }).join('')}
  </div>`;
}

async function saveRef(pi){
  const u=S.ud;
  const ref=JSON.parse(JSON.stringify(u.reflections||{}));
  ref[pi]={};
  (u.habits||[]).forEach((_,hi)=>{
    const el=document.getElementById(`ref-${pi}-h${hi}`);
    if(el)ref[pi][`h${hi}_ref`]=el.value.trim();
  });
  const nxt=document.getElementById(`ref-${pi}-next`);
  if(nxt)ref[pi].next=nxt.value.trim();
  u.reflections=ref;
  await saveUser(u);
  S.ud=u;
  toast('✓ Reflection saved!');
  render();
}

        PHASE ${pi+1} · ${['30-DAY','60-DAY','90-DAY'][pi]} CHECK-IN
      </div>
      ${ref[pi]?h.map((hb,hi)=>`<div style="margin-bottom:8px">
        <div style="font-size:10px;color:var(--muted);margin-bottom:3px">Action ${hi+1}: ${hb.name}</div>
        <div style="font-size:12px;line-height:1.6;background:rgba(255,255,255,0.02);border-radius:7px;padding:8px">${ref[pi][`h${hi}_ref`]||'—'}</div>
      </div>`).join('')+`<div style="margin-bottom:8px">
        <div style="font-size:10px;color:var(--muted);margin-bottom:3px">What's Next</div>
        <div style="font-size:12px;line-height:1.6;background:rgba(255,255,255,0.02);border-radius:7px;padding:8px">${ref[pi].next||'—'}</div>
      </div>`:`<p style="font-size:12px;color:var(--muted);font-style:italic">Not completed yet</p>`}
    </div>`).join('')}
    ${S.aiReport?`<div class="sdiv">AI Coaching Report</div><div class="ai-box">${S.aiReport}</div>`:''}
  </div>`;
}

async function viewUser(email){
  const u=(S.adminUsers||[]).find(x=>x.email===email);
  set({adminTab:'detail',selUser:u,aiReport:''});
}

async function refreshAdmin(){
  const users=await getAllUsers();
  set({adminUsers:users});
  toast('✓ Refreshed');
}

// ── AI REPORT ────────────────────────────────────────────
async function genAI(email){
  if(S.aiLoading)return;
  if(!ANTHROPIC_KEY||ANTHROPIC_KEY==='ANTHROPIC_KEY_PLACEHOLDER'){toast('⚠ AI key not set in Netlify');return;}
  const u=(S.adminUsers||[]).find(x=>x.email===email)||S.selUser;
  if(!u)return;
  set({aiLoading:true,aiReport:''});
  const day=dayNum(u.start_date);
  const h=u.habits||[];const ci=u.checkins||{};const ref=u.reflections||{};const plan=u.plan||{};
  const hStats=h.map((hb,i)=>{
    const tot=Object.keys(ci).filter(d=>ci[d]&&ci[d][i]).length;
    return`${hb.name}: ${tot}/${day} days (${day?Math.round(tot/day*100):0}%)`;
  }).join('\n');
  const refText=[0,1,2].map(pi=>ref[pi]?
    `Phase ${pi+1}:\n${h.map((hb,hi)=>`Action ${hi+1} (${hb.name}): ${ref[pi][`h${hi}_ref`]||'—'}`).join('\n')}\nNext steps: ${ref[pi].next||'—'}`
    :`Phase ${pi+1}: Not yet completed`).join('\n\n');
  const prompt=`You are an expert Learning & Development coach at CCM Consultancy. Write a professional, warm, and insightful coaching report.

PARTICIPANT: ${u.name}
WORKSHOP: ${u.workshop||'Not specified'}
DAY: ${day} of 90

PLAN SUMMARY:
Identity shift: ${plan.identity||'Not completed'}
Key learnings: ${plan.keylearnings||'Not completed'}
Strengths: ${plan.strengths||'Not completed'}
Gaps: ${plan.gaps||'Not completed'}
Accountability: ${plan.accountability||'Not completed'}

HABIT PERFORMANCE:
${hStats||'No habits set'}

PHASE REFLECTIONS:
${refText}

Write a concise 4-section coaching report:
1. Overall Progress Summary
2. Habit Analysis (specific observations per habit)
3. Growth Insights (patterns from reflections and identity work)
4. Recommendations for Next Phase (3 specific, actionable suggestions)

Be specific, encouraging, and reference actual data and their own words where possible.`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':ANTHROPIC_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    const report=data.content?.[0]?.text||'Report generation failed.';
    set({aiLoading:false,aiReport:report});
  }catch(e){set({aiLoading:false,aiReport:'Error generating report.'});}
}

// ── PDF ──────────────────────────────────────────────────
function doDownloadPDF(){genPDF(S.ud);}
function adminPDF(email){
  const u=(S.adminUsers||[]).find(x=>x.email===email)||S.selUser;
  if(u)genPDF(u);
}

function genPDF(u){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210;const M=20;let y=20;const lh=6;

  function rect(x,yw,h,color){doc.setFillColor(...color);doc.rect(x,yw,h[0],h[1],'F');}
  function txt(t,sz,bold,col,maxW){
    doc.setFontSize(sz);doc.setFont('helvetica',bold?'bold':'normal');
    doc.setTextColor(...(col||[232,245,224]));
    const lines=doc.splitTextToSize(String(t||'—'),maxW||W-M*2);
    lines.forEach(l=>{if(y>274){doc.addPage();y=20;rect(0,0,[210,297],[10,26,12]);}doc.text(l,M,y);y+=lh;});
    y+=2;
  }
  function section(t){
    y+=4;
    doc.setFillColor(20,40,22);doc.rect(M-4,y-4,W-M*2+8,8,'F');
    txt(t,9,true,[200,244,0]);
  }

  // BG
  rect(0,0,[210,297],[10,26,12]);
  // Header
  doc.setFillColor(15,30,18);doc.rect(0,0,210,36,'F');
  txt('CCM CONSULTANCY',8,true,[200,244,0]);y-=3;
  txt('Personal Development Plan',16,true,[232,245,224]);
  txt(`${u.name}  ·  ${u.workshop||'Workshop'}  ·  Day ${dayNum(u.start_date)} of 90`,9,false,[106,138,110]);
  y+=4;

  const plan=u.plan||{};
  const PLABELS=[
    ['keylearnings','Key Learnings & Insights'],['identity','Desired Identity Shift'],
    ['strengths','Supporting Strengths'],['gaps','Potential Gaps'],
    ['obstacles','Obstacles'],['solutions','Proactive Solutions'],
    ['tracking','Tracking'],['accountability','Accountability Partner']
  ];
  section('DEVELOPMENT PLAN');
  PLABELS.forEach(([k,lbl])=>{txt(lbl,9,true,[200,244,0]);txt(plan[k]||'Not completed',9,false,[200,220,200]);});

  const h=u.habits||[];
  if(h.length){
    section('HABITS — ATOMIC HABITS FRAMEWORK');
    h.forEach((hb,i)=>{
      txt(`Action ${i+1}: ${hb.name}`,10,true,[77,255,160]);
      ['Cue','Craving','Response','Reward'].forEach((law,li)=>txt(`${law}: ${hb.laws&&hb.laws[li]||'—'}`,9,false,[180,210,180]));
    });
  }

  const ref=u.reflections||{};
  const hasRef=Object.keys(ref).length>0;
  if(hasRef){
    section('PHASE REFLECTIONS');
    [0,1,2].forEach(pi=>{
      if(ref[pi]){
        txt(`Phase ${pi+1} — ${['30-Day','60-Day','90-Day'][pi]} Check-in`,10,true,[77,255,160]);
        h.forEach((hb,hi)=>{
          txt(`Action ${hi+1}: ${hb.name}`,9,true,[200,244,0]);
          txt(ref[pi][`h${hi}_ref`]||'—',9,false,[180,210,180]);
        });
        txt("What's Next",9,true,[200,244,0]);
        txt(ref[pi].next||'—',9,false,[180,210,180]);
      }
    });
  }

  if(S.aiReport){
    section('AI COACHING REPORT');
    txt(S.aiReport,9,false,[180,210,210]);
  }

  doc.save(`PDP-${u.name.replace(/\s+/g,'-')}.pdf`);
  toast('✓ PDF downloaded!');
}

// ── CSV ──────────────────────────────────────────────────
async function exportCSV(){
  const users=S.adminUsers||[];
  if(!users.length){toast('No data');return;}
  const LAWS=['Cue','Craving','Response','Reward'];
  const hdrs=['Name','Email','Workshop','Day',
    'Key Learnings','Identity Shift','Strengths','Gaps','Obstacles','Solutions','Tracking','Accountability',
    ...[0,1,2].flatMap(i=>[`Habit${i+1}`,...LAWS.map(l=>`Habit${i+1} ${l}`)]),
    ...[0,1,2].flatMap(pi=>[`Phase${pi+1} Next`])
  ];
  const rows=users.map(u=>{
    const p=u.plan||{};const h=u.habits||[];const ref=u.reflections||{};
    return[
      u.name,u.email,u.workshop||'',dayNum(u.start_date),
      p.keylearnings||'',p.identity||'',p.strengths||'',p.gaps||'',
      p.obstacles||'',p.solutions||'',p.tracking||'',p.accountability||'',
      ...[0,1,2].flatMap(i=>[h[i]?.name||'',...LAWS.map((_,li)=>h[i]?.laws?.[li]||'')]),
      ...[0,1,2].map(pi=>ref[pi]?.next||'')
    ].map(x=>'"'+String(x).replace(/"/g,'""')+'"');
  });
  const csv=[hdrs.map(h=>'"'+h+'"').join(','),...rows.map(r=>r.join(','))].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='pdp-export.csv';a.click();
  toast('✓ CSV exported!');
}

render();
