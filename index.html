<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="ak" content="ANTHROPIC_KEY_PLACEHOLDER">
<meta name="ac" content="ADMIN_CODE_PLACEHOLDER">
<title>Personal Development Plan – CCM Consultancy</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#F7F5F2;
  --surface:#FFFFFF;
  --surface2:#F0EDE8;
  --red:#D4231A;
  --red-light:#FDF1F0;
  --red-border:#F5C5C3;
  --text:#1A1A1A;
  --text2:#4A4A4A;
  --muted:#8A8A8A;
  --border:#E4E0DA;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.04);
  --shadow-lg:0 4px 24px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.04);
  --radius:12px;
  --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100vh}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased}
#app{width:100%;max-width:700px;margin:0 auto;padding:20px 16px 100px}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px;box-shadow:var(--shadow);flex-wrap:wrap;gap:10px}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-left img{height:30px;border-radius:4px}
.topbar-title{font-size:13px;font-weight:700;color:var(--text);letter-spacing:.3px}
.topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.chip{font-size:11px;color:var(--red);background:var(--red-light);padding:3px 10px;border-radius:20px;border:1px solid var(--red-border);font-weight:600;white-space:nowrap}
.btn-xs{font-size:12px;padding:5px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;white-space:nowrap;transition:all .18s;font-weight:500}
.btn-xs:hover{border-color:var(--red);color:var(--red);background:var(--red-light)}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:var(--shadow)}
.card-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:var(--text);margin-bottom:18px;display:flex;align-items:center;gap:8px;border-bottom:2px solid var(--red);padding-bottom:12px}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px;background:var(--bg)}
.login-box{width:100%;max-width:440px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 32px;box-shadow:var(--shadow-lg)}
.login-logo{height:52px;display:block;margin:0 auto 22px;border-radius:4px}
.login-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--text);text-align:center;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:10px;line-height:1.6}
.login-intro{background:var(--red-light);border:1px solid var(--red-border);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:22px;font-size:12.5px;color:var(--text2);line-height:1.75}
.login-intro strong{color:var(--red);display:block;margin-bottom:6px;font-size:11px;letter-spacing:1px;text-transform:uppercase}
.login-intro li{margin-left:16px;margin-bottom:3px}
.tabs{display:flex;gap:6px;margin-bottom:20px;background:var(--surface2);padding:4px;border-radius:var(--radius-sm)}
.tab{flex:1;font-size:12px;font-weight:600;padding:7px;border-radius:6px;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all .18s;letter-spacing:.3px}
.tab.on{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.08);font-weight:700}
.inp{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;margin-bottom:10px;outline:none;transition:border-color .18s}
.inp:focus{border-color:var(--red)}
.inp::placeholder{color:var(--muted)}
textarea.inp{resize:vertical;min-height:88px;line-height:1.65}
.btn-main{width:100%;background:var(--red);color:#fff;border:none;border-radius:var(--radius-sm);padding:12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.3px;transition:all .18s;margin-top:4px}
.btn-main:hover{background:#B81E16;transform:translateY(-1px);box-shadow:0 4px 12px rgba(212,35,26,0.25)}
.btn-main:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
.err{font-size:12px;color:var(--red);margin-bottom:8px;padding:8px 12px;background:var(--red-light);border-radius:6px;border:1px solid var(--red-border)}

/* STEPS NAV */
.steps-nav{display:flex;gap:4px;margin-bottom:20px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;background:var(--surface);padding:6px;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow)}
.steps-nav::-webkit-scrollbar{display:none}
.step-dot{flex-shrink:0;font-size:11px;font-weight:600;letter-spacing:.3px;padding:7px 14px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all .18s;white-space:nowrap}
.step-dot.on{background:var(--red);color:#fff;box-shadow:0 2px 8px rgba(212,35,26,0.2)}
.step-dot.done{color:var(--red);background:var(--red-light)}

/* FORM */
.fgroup{margin-bottom:18px}
.flabel{font-size:11.5px;font-weight:700;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;display:block}
.fexample{font-size:12px;color:var(--muted);font-style:italic;margin-top:6px;line-height:1.6;padding:10px 12px;background:var(--surface2);border-radius:var(--radius-sm);border-left:3px solid var(--red-border)}

/* HABIT BLOCK */
.habit-block{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.habit-block-title{font-size:13px;font-weight:700;color:var(--red);margin-bottom:14px;letter-spacing:.3px}

/* DASHBOARD */
.day-card{background:var(--red);color:#fff;border-radius:var(--radius);padding:22px 24px;margin-bottom:16px;box-shadow:0 4px 20px rgba(212,35,26,0.2)}
.day-big{font-family:'Playfair Display',serif;font-size:48px;font-weight:700;line-height:1;color:#fff}
.day-lbl{font-size:12px;color:rgba(255,255,255,0.75);margin-top:4px;font-weight:400}
.phase-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.phase-tile{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 10px;text-align:center;box-shadow:var(--shadow)}
.phase-tile.now{border-color:var(--red);border-width:2px;background:var(--red-light)}
.phase-tile.done{border-color:#B8D8B8;background:#F2FAF2}
.phase-pct{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--red)}
.phase-lbl{font-size:9.5px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;font-weight:600}
.phase-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px}
.phase-fill{height:100%;background:var(--red);border-radius:2px}

/* HABIT CHECK */
.hcheck{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;transition:all .18s;outline:none}
.hcheck:hover{border-color:var(--red);background:var(--red-light)}
.hcheck:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(212,35,26,0.12)}
.hcheck.yes{border-color:var(--red);background:var(--red-light)}
.hcheck-box{width:22px;height:22px;border-radius:5px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .18s;background:var(--surface)}
.hcheck.yes .hcheck-box{background:var(--red);border-color:var(--red)}
.hcheck-name{font-size:13.5px;flex:1;font-weight:500;color:var(--text)}
.hcheck-streak{font-size:12px;color:var(--muted);font-weight:600}

/* REFLECTION */
.ref-block{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.ref-block.open{border-color:var(--red-border)}
.ref-block.done{border-color:#B8D8B8;background:#F8FDF8}
.ref-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.5px;padding:3px 8px;border-radius:20px;text-transform:uppercase}
.badge-lime{background:var(--red-light);color:var(--red);border:1px solid var(--red-border)}
.badge-green{background:#EAF7EA;color:#2E7D32;border:1px solid #B8D8B8}
.badge-muted{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.ref-habit-label{font-size:12px;color:var(--red);letter-spacing:.3px;font-weight:700;margin-bottom:6px}

/* BUTTONS */
.btn-green{background:var(--red);color:#fff;border:none;border-radius:var(--radius-sm);padding:10px 20px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.3px;transition:all .18s}
.btn-green:hover{background:#B81E16;transform:translateY(-1px);box-shadow:0 4px 12px rgba(212,35,26,0.2)}
.btn-green:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-outline{background:var(--surface);border:1.5px solid var(--border);color:var(--text2);border-radius:var(--radius-sm);padding:9px 18px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .18s}
.btn-outline:hover{border-color:var(--red);color:var(--red);background:var(--red-light)}
.brow{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}

/* ADMIN TABLE */
.atable{width:100%;border-collapse:collapse;font-size:12.5px}
.atable th{text-align:left;font-size:10px;letter-spacing:1px;color:var(--muted);padding:8px 10px;border-bottom:2px solid var(--border);text-transform:uppercase;font-weight:700;background:var(--surface2)}
.atable td{padding:10px;border-bottom:1px solid var(--border);vertical-align:middle}
.atable tr:hover td{background:var(--red-light)}
.ppill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.phi{background:#EAF7EA;color:#2E7D32}
.pmd{background:#FFF8E1;color:#E65100}
.plo{background:var(--red-light);color:var(--red)}

/* AI BOX */
.ai-box{background:#F0F4FF;border:1px solid #C8D8FF;border-radius:var(--radius);padding:16px;margin-top:14px;font-size:13px;line-height:1.8;color:#2A3A6A;white-space:pre-wrap}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:#fff;padding:10px 20px;border-radius:30px;font-size:12.5px;font-weight:500;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err-toast{background:var(--red)}

/* SPINNER */
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}

/* SECTION DIVIDER */
.sdiv{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;padding:10px 0 6px;border-bottom:1px solid var(--border);margin-bottom:14px}

/* INTRO FEATURE GRID */
.intro-tip{display:flex;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:6px;font-size:13px;line-height:1.5;color:var(--text2)}
.intro-tip-icon{color:var(--red);font-weight:700;flex-shrink:0;margin-top:1px}

@media(max-width:480px){
  .phase-grid{grid-template-columns:repeat(3,1fr)}
  .phase-pct{font-size:18px}
  #app{padding:12px 10px 80px}
  .card{padding:18px}
  .login-box{padding:28px 20px}
}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
const SUPA_URL='https://exqpnofliridwdrcyien.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4cXBub2ZsaXJpZHdkcmN5aWVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MDYwODgsImV4cCI6MjA5MTk4MjA4OH0.xVkvptHGnTDAoQ288uQiAHSct2qpREMzY-2dRdGwt8M';
const ANTHROPIC_KEY=((document.querySelector('meta[name="ak"]')||{}).content)||'';
var akMeta2=document.querySelector('meta[name="ac"]');var ADMIN_CODE=akMeta2?akMeta2.content:'admin2024';
const LOGO='https://www.ccmconsultancy.com/wp-content/uploads/2019/09/cropped-CCM-Square-8-150.png';

// ── SUPABASE ─────────────────────────────────────────────
async function dbQ(path,method,body,extraHeaders){
  var headers={'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'};
  if(extraHeaders){for(var k in extraHeaders){headers[k]=extraHeaders[k];}}
  var opts={method:method||'GET',headers:headers};
  if(body){opts.body=body;}
  try{
    var r=await fetch(SUPA_URL+'/rest/v1/'+path,opts);
    if(!r.ok){var t=await r.text();console.error('DB',r.status,t);return null;}
    var ct=r.headers.get('content-type')||'';
    return ct.indexOf('json')>-1?await r.json():true;
  }catch(e){console.error(e);return null;}
}
async function getUser(email){
  var d=await dbQ('pdp_users?email=eq.'+encodeURIComponent(email)+'&limit=1','GET',null,null);
  return d&&d.length?d[0]:null;
}
async function saveUser(u){
  var exists=await getUser(u.email);
  u.updated_at=new Date().toISOString();
  var body=JSON.stringify(u);
  if(exists){
    await dbQ('pdp_users?email=eq.'+encodeURIComponent(u.email),'PATCH',body,{'Prefer':'return=minimal'});
  }else{
    u.created_at=new Date().toISOString();
    body=JSON.stringify(u);
    await dbQ('pdp_users','POST',body,{'Prefer':'return=representation'});
  }
}
async function getAllUsers(){
  var d=await dbQ('pdp_users?select=*&order=created_at.desc','GET',null,null);
  return d||[];
}

// ── STATE ────────────────────────────────────────────────
let S={
  screen:'login',loginMode:'p',loginStep:'email',
  prefillEmail:'',prefillName:'',prefillWs:'',
  user:null,ud:null,
  step:0,adminTab:'list',adminUsers:[],
  selUser:null,aiReport:'',aiLoading:false,saving:false
};
function safe(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function set(p){Object.assign(S,p);render();}

// ── HELPERS ──────────────────────────────────────────────
function toast(m,d=2500){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),d);
}
function dayNum(sd){
  if(!sd)return 1;
  return Math.max(1,Math.floor((Date.now()-new Date(sd))/86400000)+1);
}
function phPct(ud,pi){
  const h=ud.habits||[];if(!h.length)return 0;
  const ranges=[[1,30],[31,60],[61,90]];
  const[s,e]=ranges[pi];const ci=ud.checkins||{};
  let done=0,tot=0;
  for(let d=s;d<=e;d++){h.forEach((_,i)=>{tot++;if(ci[d]&&ci[d][i])done++;});}
  return tot?Math.round(done/tot*100):0;
}
function hStreak(ud,hi){
  const d=dayNum(ud.start_date);const ci=ud.checkins||{};
  let s=0;for(let x=d;x>=1;x--){if(ci[x]&&ci[x][hi])s++;else break;}return s;
}
function pc(p){return p>=70?'phi':p>=40?'pmd':'plo';}

// ── RENDER ───────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  if(!app)return;
  try{
    app.innerHTML=
      S.screen==='login'?rLogin():
      S.screen==='participant'?rPart():
      rAdmin();
  }catch(e){
    app.innerHTML=`<div style="padding:30px;color:#f87;font-size:12px;font-family:monospace">Render error: ${e.message}</div>`;
    console.error(e);
  }
}

// ── LOGIN ────────────────────────────────────────────────
function rLogin(){
  const isP=S.loginMode==='p';
  return`<div class="login-wrap">
  <div class="login-box">
    <img src="${LOGO}" class="login-logo">
    <div class="login-title">Personal Development Plan</div>

    ${isP?`<div class="login-intro">
      <strong>Welcome</strong>
      Enter your details below to access your 90-day Personal Development Plan. If you have visited before, use the same email to continue where you left off.
    </div>`:''}
    <div class="tabs">
      <button class="tab ${isP?'on':''}" onclick="set({loginMode:'p'})">Participant</button>
      <button class="tab ${!isP?'on':''}" onclick="set({loginMode:'a'})">Admin</button>
    </div>
    <div id="lerr" class="err" style="display:none"></div>
    ${isP?`
      ${S.loginStep==='new'?`
        <div style="font-size:12px;color:var(--muted);margin-bottom:14px;padding:10px 12px;background:var(--surface2);border-radius:var(--radius-sm)">
          Welcome! Please complete your details to get started.
        </div>
        <input class="inp" id="ln" placeholder="Your full name" value="${S.prefillName||''}">
        <input class="inp" id="le" placeholder="Your email address" type="email" value="${S.prefillEmail||''}">
        <input class="inp" id="lw" placeholder="Workshop name (e.g. Authentic Leadership)" style="margin-bottom:14px" value="${S.prefillWs||''}">
        <button class="btn-main" onclick="doLoginNew()">Start My PDP →</button>
        <button onclick="set({loginStep:'email',prefillName:'',prefillEmail:'',prefillWs:''})" style="width:100%;background:none;border:none;color:var(--muted);font-size:12px;margin-top:10px;cursor:pointer;padding:4px">← Back</button>
      `:S.loginStep==='returning'?`
        <div style="font-size:13px;color:var(--text2);margin-bottom:16px;padding:12px 14px;background:var(--surface2);border-radius:var(--radius-sm);border-left:3px solid var(--red)">
          Welcome back! Continuing your plan.
        </div>
        <input class="inp" id="le2" placeholder="Confirm your email" type="email" value="${S.prefillEmail||''}" style="margin-bottom:14px">
        <button class="btn-main" onclick="doLoginReturning()">Continue My PDP →</button>
        <button onclick="set({loginStep:'email',prefillEmail:''})" style="width:100%;background:none;border:none;color:var(--muted);font-size:12px;margin-top:10px;cursor:pointer;padding:4px">← Back</button>
      `:`
        <input class="inp" id="le0" placeholder="Your email address" type="email" autocomplete="email" style="margin-bottom:14px">
        <button class="btn-main" onclick="doCheckEmail()">Continue →</button>
      `}
    `:`
      <input class="inp" id="lac" placeholder="Admin code" type="password" style="margin-bottom:14px">
      <button class="btn-main" onclick="doAdmin()">Access Dashboard →</button>
    `}
  </div>
</div>`;
}

async function doCheckEmail(){
  var emailEl=document.getElementById('le0');
  var email=emailEl?emailEl.value.trim():'';
  var err=document.getElementById('lerr');
  if(!email||!email.includes('@')){
    err.style.display='block';err.textContent='Please enter a valid email address.';return;
  }
  err.style.display='none';
  var btn=document.querySelector('.btn-main');
  if(btn){btn.disabled=true;btn.textContent='Checking...';}
  var existing=await getUser(email);
  if(existing){
    set({loginStep:'returning',prefillEmail:email});
  }else{
    set({loginStep:'new',prefillEmail:email});
  }
}

async function doLoginNew(){
  var name=document.getElementById('ln').value.trim();
  var email=document.getElementById('le').value.trim();
  var ws=document.getElementById('lw').value.trim();
  var err=document.getElementById('lerr');
  if(!name){err.style.display='block';err.textContent='Please enter your full name.';return;}
  if(!email||!email.includes('@')){err.style.display='block';err.textContent='Please enter a valid email.';return;}
  err.style.display='none';
  var ud={email:email,name:name,workshop:ws||'',start_date:new Date().toISOString().split('T')[0],plan:{},habits:[],checkins:{},reflections:{}};
  var ok=await saveUser(ud);
  if(!ok){err.style.display='block';err.textContent='Could not create your account. Please check your connection.';return;}
  set({screen:'participant',user:{name:ud.name,email:email},ud:ud,step:0,loginStep:'email'});
}

async function doLoginReturning(){
  var emailEl=document.getElementById('le2');
  var email=emailEl?emailEl.value.trim():S.prefillEmail;
  var err=document.getElementById('lerr');
  if(!email||!email.includes('@')){err.style.display='block';err.textContent='Please confirm your email address.';return;}
  err.style.display='none';
  var ud=await getUser(email);
  if(!ud){
    err.style.display='block';

async function savePlan(){
  if(S.saving)return;
  set({saving:true});
  const u=S.ud;
  const plan={
    keylearnings:v('p-keylearnings'),identity:v('p-identity'),
    strengths:v('p-strengths'),gaps:v('p-gaps'),
    obstacles:v('p-obstacles'),solutions:v('p-solutions'),
    tracking:v('p-tracking'),accountability:v('p-accountability')
  };
  const habits=[];
  [0,1,2].forEach(i=>{
    const name=v(`h${i}-name`);
    if(name){
      habits.push({name,laws:[v(`h${i}-cue`),v(`h${i}-craving`),v(`h${i}-response`),v(`h${i}-reward`)]});
    }
  });
  u.plan=plan;u.habits=habits;
  var saveOk=await saveUser(u);
  S.ud=u;
  set({saving:false});
  if(saveOk===null){
    toast('❌ Save failed — please check your connection and try again.');
  }else{
    toast('✓ Plan saved successfully!');
  }
}

function v(id){const el=document.getElementById(id);return el?el.value.trim():'';}

function toggle(day,hi){
  const ci=JSON.parse(JSON.stringify(S.ud.checkins||{}));
  if(!ci[day])ci[day]={};
  ci[day][hi]=!ci[day][hi];
  S.ud.checkins=ci;render();
}

async function saveCheckin(){
  var ok=await saveUser(S.ud);

}

// STEP 3 — DASHBOARD
function rDash(){
  const u=S.ud;const day=dayNum(u.start_date);
  const phIdx=day<=30?0:day<=60?1:2;
  const h=u.habits||[];
  const ci=u.checkins||{};
  var streak=0;for(var sd=day;sd>=1;sd--){if(h.every(function(_,i){return ci[sd]&&ci[sd][i];})){streak++;}else{break;}}
  return`
  <div class="day-card">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:10px">
      <div>
        <div class="day-big">${day}</div>
        <div class="day-lbl">Day of your 90-day journey</div>
      </div>
      <div style="text-align:right">
        <div style="font-family:'Playfair Display',serif;font-size:26px;font-weight:800;color:var(--warn)">${streak}🔥</div>
        <div style="font-size:11px;color:var(--muted)">Day streak</div>
      </div>
    </div>
  </div>
  <div class="phase-grid">
    ${[0,1,2].map(i=>{
      const pct=phPct(u,i);
      return`<div class="phase-tile ${phIdx===i?'now':i<phIdx?'done':''}">

        <div class="phase-pct">${pct}%</div>
        <div style="font-size:9px;color:var(--muted)">${['Days 1–30','Days 31–60','Days 61–90'][i]}</div>
        <div class="phase-bar"><div class="phase-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('')}

  <div class="card">
    <div class="card-title">My Habits</div>
    ${!h.length?`<p style="font-size:13px;color:var(--muted)">No habits set. Go to <a href="#" onclick="set({step:1})" style="color:var(--red)">My Plan</a> to add habits.</p>`:
    h.map((hb,i)=>{
      const tot=Object.keys(ci).filter(d=>ci[d]&&ci[d][i]).length;
      const pct=day?Math.round(tot/day*100):0;
      return`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;margin-bottom:7px">
        <div>
          <div style="font-size:13px;font-weight:500">${hb.name}</div>
          <div style="font-size:11px;color:var(--warn);margin-top:2px">${hStreak(u,i)}🔥 streak</div>

          <div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:800;color:var(--red)">${pct}%</div>

// STEP 4 — REFLECTIONS
function rRef(){
  const u=S.ud;const day=dayNum(u.start_date);
  const ref=u.reflections||{};
  const h=u.habits||[];
  const phases=[
    {label:'Phase 1: 30-Day Check-in',sub:'Laying the Foundation',unlock:30},
    {label:'Phase 2: 60-Day Check-in',sub:'Building Momentum',unlock:60},
    {label:'Phase 3: 90-Day Check-in',sub:'Sustaining Growth',unlock:90}
  ];
  return`<div class="card">
    <div class="card-title">💬 Phase Reflections</div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.6">Reflections unlock at the end of each phase. Your habit names are carried over automatically — just reflect on your progress.</p>
    ${phases.map((ph,pi)=>{
      const isOpen=day>=ph.unlock;
      const isDone=ref[pi]&&h.every((_,hi)=>ref[pi][`h${hi}_ref`]);
      return`<div class="ref-block ${isOpen?'open':''} ${isDone?'done':''}">
        <div class="ref-header">
          <div>
            <span class="badge ${isDone?'badge-green':isOpen?'badge-lime':'badge-muted'}">${isDone?'✓ Complete':isOpen?'Unlocked':'Locked'}</span>
            <strong style="font-size:13px;color:var(--text);margin-left:8px">${ph.label}</strong>
          </div>
          <span style="font-size:11px;color:var(--muted)">${ph.sub}</span>
        </div>
        ${isOpen?`
          ${!h.length?'<p style="font-size:12px;color:var(--muted);font-style:italic">No habits set yet. Complete your plan first.</p>':
          h.map((hb,hi)=>`
            <div style="margin-bottom:14px">
              <div class="ref-habit-label">Action ${hi+1}: ${hb.name}</div>
              <div class="fgroup">
                <label class="flabel">Reflect on your progress with this action</label>
                <textarea class="inp" id="ref-${pi}-h${hi}" rows="3" placeholder="How has this habit been going? What have you noticed?">${(ref[pi]&&ref[pi][`h${hi}_ref`])||''}</textarea>
              </div>
            </div>`).join('')}
          <div class="fgroup">
            <label class="flabel">What's next? (Phase ${pi+1} onwards)</label>
            <textarea class="inp" id="ref-${pi}-next" rows="2" placeholder="What will you focus on or adjust going forward?">${(ref[pi]&&ref[pi].next)||''}</textarea>
          </div>
          <button class="btn-green" onclick="saveRef(${pi})">Save Phase ${pi+1} Reflection</button>
        `:`<div style="font-size:12px;color:var(--muted);font-style:italic">Unlocks on Day ${ph.unlock} · You are on Day ${day}</div>`}
      </div>`;
    }).join('')}
  </div>`;
}

async function saveRef(pi){
  const u=S.ud;
  const ref=JSON.parse(JSON.stringify(u.reflections||{}));
  ref[pi]={};
  (u.habits||[]).forEach((_,hi)=>{
    const el=document.getElementById(`ref-${pi}-h${hi}`);
    if(el)ref[pi][`h${hi}_ref`]=el.value.trim();
  });
  const nxt=document.getElementById(`ref-${pi}-next`);
  if(nxt)ref[pi].next=nxt.value.trim();
  u.reflections=ref;
  var refOk=await saveUser(u);
  S.ud=u;
  if(refOk===null){
    toast('❌ Save failed — please check your connection and try again.');
  }else{
    toast('✓ Reflection saved!');
  }
  render();
}

            <td style="font-size:11px;color:var(--muted)">${safe(u.workshop)||'—'}</td>
            <td><span class="badge badge-lime">D${d}</span></td>
            ${[0,1,2].map(i=>{const p=phPct(u,i);return`<td><span class="ppill ${pc(p)}">${p}%</span></td>`;}).join('')}
            <td style="font-size:11px">${hc}</td>
            <td>
              <button class="btn-xs" onclick="viewUser('${u.email}')">View</button>
              <button class="btn-xs" onclick="adminPDF('${u.email}')">PDF</button>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    </div>
  </div>`;
}

// ── AI REPORT ────────────────────────────────────────────
async function genAI(email){
  if(S.aiLoading)return;
  if(!ANTHROPIC_KEY||ANTHROPIC_KEY==='ANTHROPIC_KEY_PLACEHOLDER'){toast('⚠ AI key not set in Netlify');return;}
  const u=(S.adminUsers||[]).find(x=>x.email===email)||S.selUser;
  if(!u)return;
  set({aiLoading:true,aiReport:''});
  const day=dayNum(u.start_date);
  const h=u.habits||[];const ci=u.checkins||{};const ref=u.reflections||{};const plan=u.plan||{};
  const hStats=h.map((hb,i)=>{
    const tot=Object.keys(ci).filter(d=>ci[d]&&ci[d][i]).length;
    return`${hb.name}: ${tot}/${day} days (${day?Math.round(tot/day*100):0}%)`;
  }).join('\n');
  const refText=[0,1,2].map(pi=>ref[pi]?
    `Phase ${pi+1}:\n${h.map((hb,hi)=>`Action ${hi+1} (${hb.name}): ${ref[pi][`h${hi}_ref`]||'—'}`).join('\n')}\nNext steps: ${ref[pi].next||'—'}`
    :`Phase ${pi+1}: Not yet completed`).join('\n\n');
  const prompt=`You are an expert Learning & Development coach at CCM Consultancy. Write a professional, warm, and insightful coaching report.

PARTICIPANT: ${u.name}
WORKSHOP: ${u.workshop||'Not specified'}
DAY: ${day} of 90

PLAN SUMMARY:
Identity shift: ${plan.identity||'Not completed'}
Key learnings: ${plan.keylearnings||'Not completed'}
Strengths: ${plan.strengths||'Not completed'}
Gaps: ${plan.gaps||'Not completed'}
Accountability: ${plan.accountability||'Not completed'}

HABIT PERFORMANCE:
${hStats||'No habits set'}

PHASE REFLECTIONS:
${refText}

Write a concise 4-section coaching report:
1. Overall Progress Summary
2. Habit Analysis (specific observations per habit)
3. Growth Insights (patterns from reflections and identity work)
4. Recommendations for Next Phase (3 specific, actionable suggestions)

Be specific, encouraging, and reference actual data and their own words where possible.`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':ANTHROPIC_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    const report=(data.content&&data.content[0]&&data.content[0].text)||'Report generation failed.';
    set({aiLoading:false,aiReport:report});
  }catch(e){set({aiLoading:false,aiReport:'Error generating report.'});}
}

// ── PDF ──────────────────────────────────────────────────
function doDownloadPDF(){genPDF(S.ud);}
function adminPDF(email){
  const u=(S.adminUsers||[]).find(x=>x.email===email)||S.selUser;
  if(u)genPDF(u);
}

function genPDF(u){
  var jsPDFObj=window.jspdf;
  var doc=new jsPDFObj.jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  var W=210,M=18,y=0,lh=5.5;

  function newPage(){
    doc.addPage();
    y=16;
    // subtle header line on continuation pages
    doc.setDrawColor(220,220,220);
    doc.setLineWidth(0.3);
    doc.line(M,12,W-M,12);
    doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(180,180,180);
    doc.text('CCM Consultancy  ·  Personal Development Plan  ·  '+u.name,M,10);
  }

  function checkY(needed){if(y+needed>278){newPage();}}

  function txt(t,sz,bold,r,g,b){
    doc.setFontSize(sz);
    doc.setFont('helvetica',bold?'bold':'normal');
    doc.setTextColor(r||30,g||30,b||30);
    var lines=doc.splitTextToSize(String(t||''),W-M*2);
    checkY(lines.length*lh+2);
    lines.forEach(function(l){doc.text(l,M,y);y+=lh;});
    y+=1;
  }

  function fieldLabel(t){
    checkY(10);
    doc.setFontSize(7.5);doc.setFont('helvetica','bold');
    doc.setTextColor(80,80,80);
    doc.text(t.toUpperCase(),M,y);
    y+=4;
  }

  function fieldValue(t){
    if(!t||t==='Not completed'){
      doc.setFontSize(9);doc.setFont('helvetica','italic');doc.setTextColor(160,160,160);
      checkY(7);doc.text('Not completed',M,y);y+=lh+1;
    }else{
      doc.setFontSize(9.5);doc.setFont('helvetica','normal');doc.setTextColor(40,40,40);
      var lines=doc.splitTextToSize(t,W-M*2);
      checkY(lines.length*lh+4);
      lines.forEach(function(l){doc.text(l,M,y);y+=lh;});
      y+=2;
    }
  }

  function sectionHeader(t){
    checkY(14);
    y+=4;
    doc.setFillColor(30,30,30);
    doc.rect(M-2,y-5,W-M*2+4,8,'F');
    doc.setFontSize(8.5);doc.setFont('helvetica','bold');doc.setTextColor(232,40,30);
    doc.text(t,M,y);
    y+=6;
  }

  function divider(){
    checkY(6);
    doc.setDrawColor(220,220,220);doc.setLineWidth(0.2);
    doc.line(M,y,W-M,y);
    y+=4;
  }

  // ── COVER HEADER ──
  doc.setFillColor(20,20,20);
  doc.rect(0,0,210,44,'F');
  doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(232,40,30);
  doc.text('CCM CONSULTANCY',M,14);
  doc.setFontSize(18);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
  doc.text('Personal Development Plan',M,26);
  doc.setFontSize(9.5);doc.setFont('helvetica','normal');doc.setTextColor(150,200,150);
  doc.text(u.name+'   ·   '+(u.workshop||'Workshop')+'   ·   Day '+dayNum(u.start_date)+' of 90',M,36);
  y=54;

  // ── PLAN ──
  var plan=u.plan||{};
  var PLABELS=[
    ['keylearnings','Key Learnings & Insights'],
    ['identity','Desired Identity Shift'],
    ['strengths','Supporting Strengths'],
    ['gaps','Potential Gaps to Address'],
    ['obstacles','Potential Obstacles'],
    ['solutions','Proactive Solutions'],
    ['tracking','Tracking Progress'],
    ['accountability','Accountability Partner']
  ];
  sectionHeader('DEVELOPMENT PLAN');
  PLABELS.forEach(function(pair){
    fieldLabel(pair[1]);
    fieldValue(plan[pair[0]]);
    divider();
  });

  // ── HABITS ──
  var h=u.habits||[];
  if(h.length){
    sectionHeader('HABITS — ATOMIC HABITS FRAMEWORK');
    var LAWS=['Make it Obvious (Cue)','Make it Attractive (Craving)','Make it Easy (Response)','Make it Satisfying (Reward)'];
    h.forEach(function(hb,i){
      checkY(12);
      doc.setFontSize(10.5);doc.setFont('helvetica','bold');doc.setTextColor(10,26,12);
      doc.setFillColor(245,235,235);
      doc.rect(M-2,y-5,W-M*2+4,8,'F');
      doc.text('Action '+(i+1)+': '+(hb.name||''),M,y);
      y+=7;
      LAWS.forEach(function(law,li){
        fieldLabel(law);
        fieldValue(hb.laws&&hb.laws[li]?hb.laws[li]:'');
      });
      if(i<h.length-1)divider();
    });
  }

  // ── REFLECTIONS ──
  var ref=u.reflections||{};
  var hasRef=false;
  for(var rk in ref){if(ref[rk]){hasRef=true;break;}}
  if(hasRef){
    sectionHeader('PHASE REFLECTIONS');
    var phaseNames=['Phase 1 — 30-Day Check-in','Phase 2 — 60-Day Check-in','Phase 3 — 90-Day Check-in'];
    [0,1,2].forEach(function(pi){
      if(ref[pi]){
        checkY(10);
        doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(30,80,30);
        doc.text(phaseNames[pi],M,y);y+=7;
        h.forEach(function(hb,hi){
          fieldLabel('Action '+(hi+1)+': '+hb.name);
          fieldValue(ref[pi]['h'+hi+'_ref']);
        });
        fieldLabel("What's Next");
        fieldValue(ref[pi].next);
        if(pi<2)divider();
      }
    });
  }

  // ── AI REPORT ──
  if(S.aiReport){
    sectionHeader('AI COACHING REPORT');
    fieldValue(S.aiReport);
  }

  doc.save('PDP-'+u.name.replace(/\s+/g,'-')+'.pdf');
  toast('✓ PDF downloaded!');
}

// ── CSV ──────────────────────────────────────────────────
async function exportCSV(){
  const users=S.adminUsers||[];
  if(!users.length){toast('No data');return;}
  const LAWS=['Cue','Craving','Response','Reward'];
  const hdrs=['Name','Email','Workshop','Day',
    'Key Learnings','Identity Shift','Strengths','Gaps','Obstacles','Solutions','Tracking','Accountability',
    ...[0,1,2].flatMap(i=>[`Habit${i+1}`,...LAWS.map(l=>`Habit${i+1} ${l}`)]),
    ...[0,1,2].flatMap(pi=>[`Phase${pi+1} Next`])
  ];
  const rows=users.map(u=>{
    const p=u.plan||{};const h=u.habits||[];const ref=u.reflections||{};
    return[
      u.name,u.email,u.workshop||'',dayNum(u.start_date),
      p.keylearnings||'',p.identity||'',p.strengths||'',p.gaps||'',
      p.obstacles||'',p.solutions||'',p.tracking||'',p.accountability||'',
      ...[0,1,2].flatMap(i=>[(h[i]&&h[i].name)||'',...LAWS.map((_,li)=>(h[i]&&h[i].laws&&h[i].laws[li])||'')]),
      ...[0,1,2].map(pi=>(ref[pi]&&ref[pi].next)||'')
    ].map(x=>'"'+String(x).replace(/"/g,'""')+'"');
  });
  const csv=[hdrs.map(h=>'"'+h+'"').join(','),...rows.map(r=>r.join(','))].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='pdp-export.csv';a.click();
  toast('✓ CSV exported!');
}

try{render();}catch(e){
  document.getElementById('app').innerHTML=`<div style="padding:40px;font-family:sans-serif;color:#fff;background:#f7f5f2;min-height:100vh"><h2 style="color:#D4231A">Loading error</h2><pre style="font-size:12px;color:#f87;margin-top:12px;white-space:pre-wrap">${e.message}\n${e.stack}</pre></div>`;
  console.error('Render error:',e);
}
</script>
